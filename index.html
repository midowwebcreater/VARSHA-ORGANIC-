<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varsha Organic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#fdfaf6;color:#111;overflow-x:hidden;}

header{
position:fixed;width:100%;top:0;
display:flex;justify-content:space-between;
padding:20px;background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);z-index:999;
}
.logo{font-weight:700;color:#2e5e4e;font-size:22px;}

.btn{
background:#2e5e4e;color:#fff;padding:10px 18px;
border:none;border-radius:30px;cursor:pointer;
}

.hero{
height:100vh;display:flex;align-items:center;
justify-content:space-around;padding:0 10%;
}
.hero h1{font-size:48px;}
.hero img{width:350px;border-radius:20px;}

.section{padding:100px 10%;}

.products{
display:grid;grid-template-columns:repeat(4,1fr);
gap:25px;
}

.card{
background:#fff;border-radius:15px;padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
transition:0.3s;
}
.card:hover{transform:translateY(-10px);}
.card img{width:100%;border-radius:10px;}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);display:none;
justify-content:center;align-items:center;
}
.modal-content{
background:#fff;padding:25px;border-radius:10px;
width:300px;text-align:center;
}

.cart{
position:fixed;right:-350px;top:0;height:100%;
width:300px;background:#fff;padding:20px;
transition:0.3s;
}
.cart.active{right:0;}

footer{text-align:center;padding:30px;color:#777;}

@media(max-width:768px){
.products{grid-template-columns:repeat(2,1fr);}
.hero{flex-direction:column;text-align:center;}
.hero img{margin-top:20px;}
}
</style>
</head>

<body>

<header>
<div class="logo">Varsha Organic</div>
<button onclick="toggleCart()" class="btn">Cart 🛒</button>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>Glow Naturally ✨</h1>
<p>Premium Organic Skincare & Haircare</p>
<button class="btn">Shop Now</button>
</div>
<img src="images/hero.jpg">
</section>

<!-- PRODUCTS -->
<section class="section">
<h2>Our Products</h2>

<div class="products">

<script>
let productList=[
["Gold Face Wash",299],
["Jadibooti Hair Oil",399],
["Coffee + Rose Combo",499],
["Rosemary Water",249],
["Shikakai Shampoo",299],
["Fairness Cream",349],
["Day Night Combo",499],
["Underarm Cream",299],
["Beet Tint",199],
["Weight Drops",399]
];

document.write(productList.map((p,i)=>`
<div class="card" onclick="openModal('${p[0]}',${p[1]})">
<img src="images/product${i+1}.jpg">
<h3>${p[0]}</h3>
<p>₹${p[1]}</p>
</div>
`).join(""));
</script>

</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="pname"></h3>
<p id="pprice"></p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h2>Cart</h2>
<ul id="cartItems"></ul>
<p id="total"></p>
<button class="btn" onclick="checkout()">Order on WhatsApp</button>
</div>

<footer>© Varsha Organic</footer>

<!-- WHATSAPP BUTTON -->
<a href="https://wa.me/917387938584" target="_blank"
style="position:fixed;bottom:20px;right:20px;
background:#25D366;color:#fff;padding:15px;
border-radius:50%;text-decoration:none;">💬</a>

<script>
let cart=[];
let current={};

function openModal(name,price){
current={name,price};
modal.style.display="flex";
pname.innerText=name;
pprice.innerText="₹"+price;
}

function addToCart(){
cart.push(current);
modal.style.display="none";
updateCart();
}

function updateCart(){
let list=document.getElementById("cartItems");
let total=0;list.innerHTML="";
cart.forEach(i=>{
let li=document.createElement("li");
li.innerText=i.name+" ₹"+i.price;
list.appendChild(li);
total+=i.price;
});
totalEl.innerText="Total ₹"+total;
}

function toggleCart(){
cartBox=document.getElementById("cart");
cartBox.classList.toggle("active");
}

function checkout(){
let msg="Hello Varsha Organic,\nOrder:\n";
cart.forEach(i=>msg+=i.name+" ₹"+i.price+"\n");
window.open("https://wa.me/917387938584?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
