<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varsha Organic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Poppins;background:#f6f6f6;color:#111;}

header{display:flex;justify-content:space-between;padding:15px;background:#fff;position:sticky;top:0;}
.logo{font-family:'Playfair Display';font-size:22px;color:#2e5e4e;}

.btn{background:#111;color:#fff;padding:10px;border:none;border-radius:6px;cursor:pointer;}

.hero{margin:20px;background:#fff;border-radius:20px;display:flex;justify-content:space-between;padding:20px;}
.hero img{width:150px;}

.section{background:#fff;margin:20px;padding:20px;border-radius:15px;}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin:20px;}
.card{padding:15px;border-radius:15px;text-align:center;cursor:pointer;transition:0.3s;}
.card:hover{transform:translateY(-10px) scale(1.03);}
.card:nth-child(odd){background:#f4a825;}
.card:nth-child(even){background:#111;color:#fff;}
.card img{width:80px;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;}
.modal-content{background:#fff;padding:15px;border-radius:15px;width:90%;max-width:350px;max-height:90vh;overflow:auto;}

.slider{position:relative;}
.slides{display:flex;transition:0.4s;}
.slides img{width:100%;border-radius:10px;cursor:zoom-in;}

.prev,.next{position:absolute;top:50%;transform:translateY(-50%);background:#000;color:#fff;border:none;}
.prev{left:5px;} .next{right:5px;}

.fullscreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;justify-content:center;align-items:center;}
.fullscreen img{width:90%;}

.cart{position:fixed;right:-320px;top:0;width:300px;height:100%;background:#fff;padding:15px;transition:0.3s;overflow:auto;}
.cart.active{right:0;}

input,select{width:100%;margin:5px 0;padding:8px;}

footer{background:#111;color:#fff;text-align:center;padding:20px;}

@media(min-width:768px){
.products{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<header>
<div class="logo">Varsha Organic</div>
<button onclick="toggleCart()" class="btn">Cart</button>
</header>

<section class="hero">
<div>
<h1>Natural Beauty Solutions</h1>
<p>100% Herbal Skincare</p>
<button class="btn" onclick="scrollToProducts()">Shop Now</button>
</div>
<img src="images/hero.jpg">
</section>

<section class="section">🌿 Natural | 🚚 3-5 Days | ⭐ Trusted</section>

<section class="section">🔥 Limited Offer - Order Now</section>

<section id="products" class="products"></section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<button onclick="closeModal()">❌</button>

<div class="slider">
<button class="prev" onclick="moveSlide(-1)">❮</button>
<div class="slides" id="slides">
<img id="img1"><img id="img2"><img id="img3"><img id="img4">
</div>
<button class="next" onclick="moveSlide(1)">❯</button>
</div>

<h3 id="pname"></h3>
<p id="pprice"></p>
<p id="pdesc"></p>

<img id="benefitsImg" style="width:100%;">
<img id="usageImg" style="width:100%;">
<img id="ingredientsImg" style="width:100%;">

<p>✔ COD Available | 🚚 Fast Delivery</p>

<button class="btn" onclick="addToCart()">Add to Cart</button>
<button class="btn" onclick="buyNow()">Buy Now 🔥</button>

</div>
</div>

<div class="fullscreen" id="fullscreen" onclick="this.style.display='none'">
<img id="zoomImg">
</div>

<div class="cart" id="cart">
<button onclick="toggleCart()">❌</button>
<h2>Cart</h2>
<ul id="cartItems"></ul>
<p id="total"></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select id="payment">
<option>COD</option>
<option>UPI</option>
</select>

<button class="btn" onclick="checkout()">Order</button>
</div>

<footer>
© Varsha Organic | 📞 7387938584
</footer>

<script>
let products=["Face Wash","Hair Oil","Coffee Combo","Rosemary","Shampoo","Cream","Combo","Underarm","Tint","Drops"];
let prices=[299,399,499,249,299,349,499,299,199,399];
let desc=["Glow","Hair growth","Combo","Roots","Smooth","Bright","Full care","Care","Tint","Weight"];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let current={},index=0;

function loadProducts(){
let html="";
products.forEach((p,i)=>{
html+=`<div class="card" onclick="openModal(${i})">
<img src="images/product${i+1}.jpg">
<h3>${p}</h3><p>₹${prices[i]}</p>
</div>`;
});
products.innerHTML=html;
}
function scrollToProducts(){products.scrollIntoView({behavior:'smooth'});}

function openModal(i){
current={name:products[i],price:prices[i]};
modal.style.display="flex";

for(let j=1;j<=4;j++){
let img=document.getElementById("img"+j);
img.src="images/product"+(i+1)+"_"+j+".jpg";
img.onclick=()=>{zoomImg.src=img.src;fullscreen.style.display="flex";}
}
}

function moveSlide(step){
index=(index+step+4)%4;
slides.style.transform="translateX(-"+(index*100)+"%)";
}

function closeModal(){modal.style.display="none";}

function addToCart(){
cart.push(current);
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
closeModal();
}

function buyNow(){addToCart();checkout();}

function updateCart(){
let list=document.getElementById("cartItems");
if(cart.length==0){list.innerHTML="Empty";return;}
let total=0;list.innerHTML="";
cart.forEach(i=>{
list.innerHTML+=`<li>${i.name} ₹${i.price}</li>`;
total+=i.price;
});
total.innerText="₹"+total;
}

function toggleCart(){cart.classList.toggle("active");}

function checkout(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(!name||!phone||!address){alert("Fill all");return;}

let id="VO"+Math.floor(Math.random()*10000);
let msg="Order ID:"+id+"\n";

cart.forEach((i,x)=>msg+=(x+1)+". "+i.name+"\n");

msg+="\n"+name+"\n"+phone+"\n"+address;

window.open("https://wa.me/917387938584?text="+encodeURIComponent(msg));
}

loadProducts();
updateCart();
</script>

</body>
</html>
