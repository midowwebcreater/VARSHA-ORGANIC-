<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varsha Organic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#f6f6f6;}

/* NAV */
header{
display:flex;justify-content:space-between;
padding:20px 40px;background:#fff;
position:sticky;top:0;z-index:100;
}
.logo{font-size:24px;font-weight:700;color:#2e5e4e;}

nav a{
margin:0 10px;cursor:pointer;color:#333;
}

/* HERO */
.hero{
margin:40px;background:#fff;border-radius:20px;
display:flex;align-items:center;justify-content:space-between;
padding:40px;
}
.hero h1{font-size:38px;}
.hero span{color:#f4a825;}
.hero p{margin:15px 0;color:#555;}

.btn{
background:#111;color:#fff;padding:10px 18px;
border:none;border-radius:6px;cursor:pointer;
}

/* PRODUCTS */
.products{
margin:40px;
display:grid;grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
border-radius:20px;padding:20px;text-align:center;
cursor:pointer;
}
.card:nth-child(odd){background:#f4a825;}
.card:nth-child(even){background:#111;color:#fff;}

.card img{width:90px;margin-bottom:10px;}

/* MODAL */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;justify-content:center;align-items:center;
}
.modal-content{
background:#fff;padding:25px;border-radius:15px;width:300px;
text-align:center;
}

/* CART */
.cart{
position:fixed;right:-320px;top:0;height:100%;
width:300px;background:#fff;padding:20px;
transition:0.3s;
}
.cart.active{right:0;}

footer{
text-align:center;padding:30px;color:#777;
}

/* MOBILE */
@media(max-width:768px){
.hero{flex-direction:column;text-align:center;}
.products{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<div class="logo">Varsha Organic</div>
<nav>
<a onclick="scrollToSection('products')">Products</a>
<a onclick="toggleCart()">Cart</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>Natural Beauty <span>Solutions</span></h1>
<p>100% Herbal Skincare, Haircare & Wellness Products</p>
<button class="btn" onclick="scrollToSection('products')">Shop Now</button>
</div>
<img src="images/hero.jpg" width="300">
</section>

<!-- PRODUCTS -->
<section id="products" class="products"></section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="pname"></h3>
<p id="pprice"></p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h2>Your Cart</h2>
<ul id="cartItems"></ul>
<p id="total"></p>
<button class="btn" onclick="checkout()">Order on WhatsApp</button>
</div>

<footer>
© Varsha Organic | Natural Beauty & Wellness Brand
</footer>

<!-- WHATSAPP BUTTON -->
<a href="https://wa.me/917387938584" target="_blank"
style="position:fixed;bottom:20px;right:20px;background:#25D366;
color:#fff;padding:15px;border-radius:50%;">💬</a>

<script>
let products=[
{name:"Gold Face Wash",price:299,img:"images/product1.jpg"},
{name:"Hair Oil",price:399,img:"images/product2.jpg"},
{name:"Coffee Combo",price:499,img:"images/product3.jpg"},
{name:"Rosemary Water",price:249,img:"images/product4.jpg"},
{name:"Shampoo",price:299,img:"images/product5.jpg"},
{name:"Fairness Cream",price:349,img:"images/product6.jpg"}
];

let cart=[];
let current={};

function loadProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card" onclick="openModal(${i})">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function openModal(i){
current=products[i];
modal.style.display="flex";
pname.innerText=current.name;
pprice.innerText="₹"+current.price;
}

function addToCart(){
cart.push(current);
modal.style.display="none";
updateCart();
}

function updateCart(){
let list=document.getElementById("cartItems");
let total=0;
list.innerHTML="";
cart.forEach(i=>{
let li=document.createElement("li");
li.innerText=i.name+" ₹"+i.price;
list.appendChild(li);
total+=i.price;
});
document.getElementById("total").innerText="Total ₹"+total;
}

function toggleCart(){
cartBox=document.getElementById("cart");
cartBox.classList.toggle("active");
}

function checkout(){
let msg="Hello Varsha Organic,\nI want to order:\n";
cart.forEach(i=>msg+=i.name+" ₹"+i.price+"\n");

window.open("https://wa.me/917387938584?text="+encodeURIComponent(msg));
}

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

loadProducts();
</script>

</body>
</html>
