<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varsha Organic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#fdfaf6;color:#111;}

header{
display:flex;justify-content:space-between;
padding:20px;background:#fff;
}
nav a{margin:0 10px;cursor:pointer;color:#2e5e4e;}

.section{display:none;padding:40px;}
.active{display:block;}

.grid{
display:grid;grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:#fff;padding:15px;border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.05);
}
.card img{width:100%;border-radius:8px;}

.btn{
background:#2e5e4e;color:#fff;padding:8px 12px;
border:none;border-radius:5px;cursor:pointer;
}

@media(max-width:768px){
.grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<header>
<h2>Varsha Organic</h2>
<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('shop')">Shop</a>
<a onclick="show('cart')">Cart</a>
</nav>
</header>

<!-- HOME -->
<section id="home" class="section active">
<h1>Glow Naturally ✨</h1>
<p>Premium Organic Skincare</p>
<button class="btn" onclick="show('shop')">Shop Now</button>
</section>

<!-- SHOP -->
<section id="shop" class="section">
<h2>Products</h2>

<div class="grid" id="productList"></div>

</section>

<!-- PRODUCT -->
<section id="product" class="section">
<div id="productDetail"></div>
</section>

<!-- CART -->
<section id="cart" class="section">
<h2>Your Cart</h2>
<ul id="cartItems"></ul>
<p id="total"></p>
<button class="btn" onclick="checkout()">Order on WhatsApp</button>
</section>

<script>
let products=[
{name:"Gold Face Wash",price:299,img:"images/product1.jpg"},
{name:"Hair Oil",price:399,img:"images/product2.jpg"},
{name:"Coffee Combo",price:499,img:"images/product3.jpg"},
{name:"Rosemary Water",price:249,img:"images/product4.jpg"}
];

let cart=[];

function show(page){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

function loadProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button class="btn" onclick="viewProduct(${i})">View</button>
</div>`;
});
document.getElementById("productList").innerHTML=html;
}

function viewProduct(i){
let p=products[i];
show("product");

document.getElementById("productDetail").innerHTML=`
<img src="${p.img}" width="200">
<h2>${p.name}</h2>
<p>₹${p.price}</p>
<button class="btn" onclick="addToCart(${i})">Add to Cart</button>
`;
}

function addToCart(i){
cart.push(products[i]);
alert("Added to cart");
updateCart();
}

function updateCart(){
let list=document.getElementById("cartItems");
let total=0;
list.innerHTML="";

cart.forEach(i=>{
let li=document.createElement("li");
li.innerText=i.name+" ₹"+i.price;
list.appendChild(li);
total+=i.price;
});

document.getElementById("total").innerText="Total ₹"+total;
}

function checkout(){
let msg="Hello Varsha Organic,\nOrder:\n";
cart.forEach(i=>msg+=i.name+" ₹"+i.price+"\n");

window.open("https://wa.me/917387938584?text="+encodeURIComponent(msg));
}

loadProducts();
</script>

</body>
</html>
