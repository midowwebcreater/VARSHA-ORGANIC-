<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varsha Organic - Natural Skincare</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Poppins;background:#f6f6f6;color:#111;overflow-x:hidden;}

header{display:flex;justify-content:space-between;padding:15px;background:#fff;position:sticky;top:0;z-index:100;}
.logo{font-family:'Playfair Display';font-size:22px;color:#2e5e4e;}
.btn{background:#111;color:#fff;padding:10px;border:none;border-radius:6px;cursor:pointer;}

.hero{margin:20px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:space-between;padding:20px;gap:20px;}
.hero img{width:150px;}
.hero h1 span{color:#f4a825;}

.section{background:#fff;margin:20px;padding:20px;border-radius:15px;}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin:20px;}
.card{padding:15px;border-radius:15px;text-align:center;cursor:pointer;}
.card:nth-child(odd){background:#f4a825;}
.card:nth-child(even){background:#111;color:#fff;}
.card img{width:80px;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;}
.modal-content{background:#fff;padding:15px;border-radius:15px;width:90%;max-width:350px;}

.slider{position:relative;overflow:hidden;}
.slides{display:flex;transition:0.4s;}
.slides img{width:100%;flex-shrink:0;border-radius:10px;cursor:zoom-in;}

.prev,.next{position:absolute;top:50%;transform:translateY(-50%);background:#000;color:#fff;border:none;padding:5px;}
.prev{left:5px;} .next{right:5px;}

.fullscreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;justify-content:center;align-items:center;}
.fullscreen img{width:90%;}

.cart{position:fixed;right:-320px;top:0;height:100%;width:300px;background:#fff;padding:15px;transition:0.3s;overflow:auto;}
.cart.active{right:0;}
input,select{width:100%;margin:5px 0;padding:8px;}

@media(min-width:768px){
.products{grid-template-columns:repeat(3,1fr);}
.hero img{width:300px;}
}
</style>
</head>

<body>

<header>
<div class="logo">Varsha Organic</div>
<button onclick="toggleCart()" class="btn">Cart</button>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>Natural Beauty <span>Solutions</span></h1>
<p>100% Herbal Skincare & Haircare</p>
<button class="btn" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">Shop Now</button>
</div>
<img src="images/hero.jpg">
</section>

<!-- TRUST -->
<section class="section">
<div>🌿 Natural | 🧪 Chemical Free | 🚚 Fast Delivery | ⭐ Trusted</div>
</section>

<!-- ABOUT -->
<section class="section">
<h2>About</h2>
<p>Varsha Organic provides safe herbal skincare & haircare products.</p>
</section>

<!-- OFFER -->
<section class="section" style="background:#111;color:#fff;text-align:center;">
🔥 Limited Stock Available
</section>

<!-- REVIEWS -->
<section class="section" style="text-align:center;">
⭐⭐⭐⭐⭐ 500+ Happy Customers
</section>

<!-- PRODUCTS -->
<section id="products" class="products"></section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<button onclick="closeModal()">❌</button>

<div class="slider">
<button class="prev" onclick="moveSlide(-1)">❮</button>
<div class="slides" id="slides">
<img id="img1"><img id="img2"><img id="img3"><img id="img4">
</div>
<button class="next" onclick="moveSlide(1)">❯</button>
</div>

<h3 id="pname"></h3>
<p id="pprice"></p>

<p id="pdesc"></p>

<button class="btn" onclick="addToCart()">Add to Cart</button>

</div>
</div>

<!-- FULLSCREEN -->
<div class="fullscreen" id="fullscreen" onclick="this.style.display='none'">
<img id="zoomImg">
</div>

<!-- CART -->
<div class="cart" id="cart">
<h2>Cart</h2>
<ul id="cartItems"></ul>
<p id="total"></p>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<select id="payment">
<option>COD</option>
<option>UPI</option>
</select>

<button class="btn" onclick="checkout()">Order</button>
</div>

<script>
let products=[
"Gold Face Wash","Hair Oil","Coffee Combo","Rosemary Water",
"Shampoo","Fairness Cream","Day Night Combo",
"Underarm Cream","Beet Tint","Weight Drops"
];

let prices=[299,399,499,249,299,349,499,299,199,399];

let desc=[
"Deep cleansing & glow","Hair growth oil","Glow combo",
"Strong roots","Soft hair shampoo","Skin brightening",
"Complete care","Underarm care","Natural tint","Weight support"
];

let cart=[],current={},index=0;

function loadProducts(){
let html="";
products.forEach((p,i)=>{
html+=`<div class="card" onclick="openModal(${i})">
<img src="images/product${i+1}.jpg">
<h3>${p}</h3><p>₹${prices[i]}</p>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function openModal(i){
current={name:products[i],price:prices[i]};
modal.style.display="flex";
document.body.style.overflow="hidden";

index=0;
slides.style.transform="translateX(0)";

pname.innerText=products[i];
pprice.innerText="₹"+prices[i];
pdesc.innerText=desc[i];

for(let j=1;j<=4;j++){
let img=document.getElementById("img"+j);
img.src="images/product"+(i+1)+"_"+j+".jpg";
img.onclick=()=>{zoomImg.src=img.src;fullscreen.style.display="flex";}
}
}

function closeModal(){
modal.style.display="none";
document.body.style.overflow="auto";
}

function moveSlide(step){
index=(index+step+4)%4;
slides.style.transform="translateX(-"+(index*100)+"%)";
}

setInterval(()=>moveSlide(1),3000);

function addToCart(){
cart.push(current);
closeModal();
updateCart();
}

function updateCart(){
let list=document.getElementById("cartItems");
let total=0;list.innerHTML="";
cart.forEach(i=>{
let li=document.createElement("li");
li.innerText=i.name+" ₹"+i.price;
list.appendChild(li);
total+=i.price;
});
document.getElementById("total").innerText="Total ₹"+total;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

function checkout(){
let name=nameInput.value,phone=phoneInput.value,address=addressInput.value;
if(!name||!phone||!address){alert("Fill all");return;}

let msg="Order:\n";
cart.forEach((i,x)=>msg+=(x+1)+". "+i.name+" ₹"+i.price+"\n");
msg+="\nName:"+name+"\nPhone:"+phone+"\nAddress:"+address;

window.open("https://wa.me/917387938584?text="+encodeURIComponent(msg));
}

loadProducts();
</script>

</body>
</html>
